<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Predictor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:550px;
            background:#fff;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .header{
            text-align:center;
            margin-bottom:30px;
        }

        .header h1{
            color:#1f2937;
            font-size:30px;
            margin-bottom:10px;
        }

        .header p{
            color:#6b7280;
            font-size:14px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
            color:#374151;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:10px;
            font-size:15px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#4f46e5;
            box-shadow:0 0 8px rgba(79,70,229,0.3);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            background:#4f46e5;
            color:white;
            font-size:16px;
            font-weight:600;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#4338ca;
        }

        .result{
            margin-top:25px;
            text-align:center;
            background:#eef2ff;
            padding:15px;
            border-radius:10px;
        }

        .result h2{
            color:#312e81;
            font-size:24px;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#9ca3af;
            font-size:13px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🎓 Student Score Predictor</h1>
        <p>Predict student exam performance using Machine Learning</p>
    </div>

    <form action="/predict" method="POST">

        <div class="form-group">
            <label>Study Hours</label>
            <input type="number" step="0.1" name="hours_studied" placeholder="Enter study hours" required>
        </div>

        <div class="form-group">
            <label>Attendance (%)</label>
            <input type="number" step="0.1" name="attendance" placeholder="Enter attendance percentage" required>
        </div>

        <div class="form-group">
            <label>Previous Score</label>
            <input type="number" step="0.1" name="previous_score" placeholder="Enter previous score" required>
        </div>

        <button type="submit" class="btn">
            Predict Score
        </button>

    </form>

   {% if prediction is not none %}
<div class="result">
    Predicted Score: {{ prediction }}
</div>
{% endif %}

    <div class="footer">
        Powered by Python • Flask • Machine Learning
    </div>

</div>

</body>
</html>
